<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close"
                        onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                </button>
                <h2 class="slds-modal__title">
                    {modalTitle}
                </h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">

                <!-- État du véhicule -->
                <lightning-combobox
                    label="État du véhicule"
                    value={etatVehicule}
                    options={etatOptions}
                    onchange={handleEtatChange}
                    required>
                </lightning-combobox>

                <!-- Nb passagers blessés -->
                <lightning-input
                    type="number"
                    label="Nombre de passagers blessés"
                    value={nbPassagers}
                    min="0"
                    onchange={handleNbChange}>
                </lightning-input>

            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Annuler" onclick={handleClose}></lightning-button>
                <lightning-button
                    label="Enregistrer"
                    variant="brand"
                    onclick={handleSave}>
                </lightning-button>
            </footer>

        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
