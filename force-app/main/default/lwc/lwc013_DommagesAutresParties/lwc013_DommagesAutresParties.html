<template>
    <div class="header-summary-box slds-m-bottom_medium">
        <div class="slds-grid slds-wrap">
            <div class="slds-col slds-size_1-of-4 summary-item">Date Survenance: <strong>{claimSummary.dateSurvenance}</strong></div>
            <div class="slds-col slds-size_1-of-4 summary-item">N° Police: <strong>{claimSummary.policyNumber}</strong></div>
            <div class="slds-col slds-size_1-of-4 summary-item">N° Immat: <strong>{claimSummary.registrationNumber}</strong></div>
            <div class="slds-col slds-size_1-of-4 summary-item">N° Déclaration: <strong>{claimSummary.caseNumber}</strong></div>
        </div>
    </div>

    <h2 class="main-title slds-m-bottom_medium">Info dommages autres parties</h2>

    <template if:true={otherParties.length}>
        <div class="slds-m-bottom_medium">
            <template for:each={otherParties} for:item="party">
                <div key={party.key} class="slds-box white-box slds-m-bottom_small vehicle-added-card">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <lightning-icon icon-name="standard:user" size="small" class="slds-m-right_small"></lightning-icon>
                        <div class="slds-col">
                            <p><strong>Nom & Prénom :</strong> {party.Nom__c} {party.Prenom__c} | <strong>Partie :</strong> {party.OpposingParty__c}</p>
                            <p class="slds-text-color_weak">CIN : {party.CIN__c} | Ville : {party.Ville__c}</p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <template if:false={isFormVisible}>
        <div class="slds-grid slds-grid_align-end slds-m-bottom_medium">
            <button class="btn-outline" onclick={showForm}>+ Ajouter une autre personne</button>
        </div>
    </template>

    <template if:true={isFormVisible}>
        <div class="slds-box white-box slds-p-around_medium">
            <h3 class="section-header slds-m-bottom_medium">Informations Personne à indemniser</h3>
            
            <div class="slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <lightning-combobox label="Type partie adverse" options={opposingPartyOptions} data-field="OpposingParty__c" onchange={handleInputChange}></lightning-combobox>
                <lightning-input label="Prénom" data-field="Prenom__c" onchange={handleInputChange} required></lightning-input>
                <lightning-combobox label="Pays" options={paysOptions} data-field="Pays__c" value={formData.Pays__c} onchange={handleInputChange} required></lightning-combobox>
                <lightning-input label="Adresse" data-field="Adresse__c" onchange={handleInputChange}></lightning-input>
                <lightning-input label="CNI" data-field="CIN__c" onchange={handleInputChange}></lightning-input>
                <lightning-combobox label="État personne" options={etatOptions} data-field="StateOfPerson__c" onchange={handleInputChange}></lightning-combobox>
                
                <div class="slds-m-top_x-small">
                    <lightning-record-picker label="Compagnie adverse" object-api-name="Account" value={formData.CompagnieAdverse__c} onchange={handleLookupChange}></lightning-record-picker>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <lightning-input label="Nom" data-field="Nom__c" onchange={handleInputChange} required></lightning-input>
                <lightning-combobox label="Civilité" options={civiliteOptions} data-field="Civilite__c" onchange={handleInputChange} required></lightning-combobox>
                <lightning-combobox label="Ville" options={villeOptions} data-field="Ville__c" onchange={handleInputChange} required></lightning-combobox>
                <lightning-input type="date" label="Date de naissance" data-field="BirthDay__c" onchange={handleInputChange}></lightning-input>
                <lightning-combobox label="Situation familiale" options={situationOptions} data-field="MaritalStatus__c" onchange={handleInputChange}></lightning-combobox>
                <lightning-input label="N° de contrat d'assurance" data-field="Numéro_de_contrat__c" value={formData.Numéro_de_contrat__c} onchange={handleInputChange}></lightning-input>
                
                <lightning-combobox label="Moyen de notification" options={notificationOptions} data-field="MoyenNotification__c" value={formData.MoyenNotification__c} onchange={handleInputChange}></lightning-combobox>
            </div>
        </div>

            <div class="slds-grid slds-grid_align-center slds-m-top_large">
                <button class="btn-secondary slds-m-right_small" onclick={handleAnnuler}>Annuler</button>
                <button class="btn-primary" onclick={handleAjouter}>Ajouter</button>
            </div>
        </div>
    </template>
</template>
